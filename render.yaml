services:
  - type: web
    name: yorkpulse-api
    runtime: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: yorkpulse-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        value: '["https://yorkpulse.com","https://www.yorkpulse.com"]'

  - type: redis
    name: yorkpulse-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
